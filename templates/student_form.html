<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>{% if student %}Edit{% else %}Add{% endif %} Student</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            max-width: 600px;
        }

        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 0.5rem;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        a {
            margin-left: 1rem;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>
    <h1>{% if student %}Edit{% else %}Add{% endif %} Student</h1>

    <form method="POST">
        {% csrf_token %}
        <label for="student_code">Student Code:</label>
        <input type="text" id="student_code" name="student_code" value="{{ student.student_code|default:'' }}" required>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ student.name|default:'' }}" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ student.email|default:'' }}" required>

        <label for="department_id">Department:</label>
        <select id="department_id" name="department_id" required>
            <option value="">-- Select Department --</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}" {% if student and student.department.id == dept.id %}selected{% endif %}>
                {{ dept.name }}
            </option>
            {% endfor %}
        </select>

        <button type="submit">Save</button>
        <a href="{% url 'admin_home' %}">Cancel</a>
    </form>
</body>

</html>
