<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>{% if department %}Edit{% else %}Add{% endif %} Department</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            max-width: 600px;
        }

        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
        }

        button {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        a {
            margin-left: 1rem;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>
    <h1>{% if department %}Edit{% else %}Add{% endif %} Department</h1>

    <form method="POST">
        {% csrf_token %}
        <label for="name">Department Name:</label>
        <input type="text" id="name" name="name" value="{{ department.name|default:'' }}" required>

        <button type="submit">Save</button>
        <a href="{% url 'admin_home' %}">Cancel</a>
    </form>
</body>

</html>
