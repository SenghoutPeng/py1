<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Confirm Delete</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      max-width: 600px;
    }

    .warning {
      color: #dc3545;
      font-weight: bold;
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    a {
      margin-left: 1rem;
      text-decoration: none;
      color: #555;
    }
  </style>
</head>

<body>
  <h1>Confirm Deletion</h1>

  <p>Are you sure you want to delete the following {{ type }}?</p>
  <p class="warning">
    {% if type == 'Department' %}
    {{ obj.name }}
    {% else %}
    {{ obj.student_code }} - {{ obj.name }}
    {% endif %}
  </p>

  <form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'admin_home' %}">Cancel</a>
  </form>
</body>

</html>
